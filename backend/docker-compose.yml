services:
  db:
    image: postgres:16-alpine
    container_name: lagro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lagro_db
      POSTGRES_USER: lagro
      POSTGRES_PASSWORD: lagro_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lagro -d lagro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: lagro_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lagro:lagro_secret@db:5432/lagro_db
      PORT: 3000
      NODE_ENV: production

volumes:
  pgdata:
